<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}NewsHub{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  nav { background: #1a1a2e; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
  nav .brand { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
  nav a { color: #ccc; text-decoration: none; margin-left: 16px; font-size: 0.9rem; }
  nav a:hover { color: white; }
  .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
  .card { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
  .btn-primary { background: #1a1a2e; color: white; }
  .btn-primary:hover { background: #16213e; }
  .btn-secondary { background: #e74c3c; color: white; }
  .messages { margin-bottom: 16px; }
  .messages .alert { padding: 10px 16px; border-radius: 6px; background: #ffe0e0; color: #c0392b; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">📰 NewsHub</span>
  <div>
    {% if user.is_authenticated %}
      <span>Hello, {{ user.username }}</span>
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    {% endif %}
  </div>
</nav>
<div class="container">
  {% if messages %}
  <div class="messages">
    {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
