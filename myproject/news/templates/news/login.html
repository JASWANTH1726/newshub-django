{% extends 'news/base.html' %}
{% block title %}Login - NewsHub{% endblock %}
{% block extra_css %}
<style>
  .auth-box { max-width: 420px; margin: 60px auto; }
  .auth-box h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
  .form-group input:focus { outline: none; border-color: #1a1a2e; }
  .btn { width: 100%; margin-top: 8px; padding: 12px; font-size: 1rem; }
  .auth-link { text-align: center; margin-top: 16px; font-size: 0.9rem; }
  .auth-link a { color: #1a1a2e; font-weight: 600; }
</style>
{% endblock %}
{% block content %}
<div class="auth-box card">
  <h2>🔐 Login to NewsHub</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <div class="auth-link">New here? <a href="{% url 'register' %}">Create an account</a></div>
</div>
{% endblock %}
